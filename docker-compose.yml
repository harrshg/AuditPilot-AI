services:
  postgres:
    image: postgres:16-alpine
    container_name: auditpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auditpilot_ai
    ports:
      - "5432:5432"
    volumes:
      - auditpilot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  auditpilot_postgres_data:
